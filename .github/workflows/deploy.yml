name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: false   # ✅ prevents strict CI failures

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-optional

      - name: Rebuild native modules
        run: npm rebuild

      - name: Build app
        run: npm run build